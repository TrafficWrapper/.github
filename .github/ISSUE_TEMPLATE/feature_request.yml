name: Feature request
description: Suggest a change without exposing deployment details.
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, UI, API, or deployment workflow.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - orchestrator
        - worker
        - app
        - cross-repo
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checklist
      options:
        - label: I did not include real domains, IPs, SNI values, tokens, keys, or bootstrap payloads.
          required: true
